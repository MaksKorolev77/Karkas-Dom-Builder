    <script>
  (function(){
    if(window.ukLyrInit)return;window.ukLyrInit=true;
    window.ukLyrTab=function(btn,cfg){
      var s=btn.closest('section');if(!s)return;
      s.querySelectorAll('.uk-lyr-tab').forEach(function(b){b.classList.remove('uk-active');});
      btn.classList.add('uk-active');
      s.querySelectorAll('.uk-lyr-svg-wrap').forEach(function(p){p.style.display='none';});
      var panel=s.querySelector('.uk-lyr-svg-wrap[data-cfg="'+cfg+'"]');
      if(panel)panel.style.display='';
      var t=s.querySelector('[data-uk-total]');if(t&&panel)t.textContent=panel.getAttribute('data-total');
      var r=s.querySelector('[data-uk-r]');if(r&&panel)r.textContent=panel.getAttribute('data-r');
      var card=s.querySelector('.uk-lyr-detail__card');if(card)card.style.display='none';
      var hint=s.querySelector('.uk-lyr-detail__hint');if(hint)hint.style.display='';
    };
    window.ukLyrOver=function(g){
      var s=g.closest('section');if(!s)return;
      var card=s.querySelector('.uk-lyr-detail__card');
      var hint=s.querySelector('.uk-lyr-detail__hint');
      if(card){
        var sw=card.querySelector('.uk-lyr-detail__swatch');if(sw)sw.style.background=g.getAttribute('data-color');
        var ti=card.querySelector('.uk-lyr-detail__title');if(ti)ti.textContent=g.getAttribute('data-name')+' — '+g.getAttribute('data-mat');
        var de=card.querySelector('.uk-lyr-detail__desc');if(de)de.textContent=g.getAttribute('data-desc');
        card.style.display='';
      }
      if(hint)hint.style.display='none';
      var hl=g.querySelector('[data-hl]');if(hl)hl.style.opacity='1';
    };
    window.ukLyrOut=function(g){
      var hl=g.querySelector('[data-hl]');if(hl)hl.style.opacity='0';
      var s=g.closest('section');if(!s)return;
      var card=s.querySelector('.uk-lyr-detail__card');if(card)card.style.display='none';
      var hint=s.querySelector('.uk-lyr-detail__hint');if(hint)hint.style.display='';
    };
  })();
  </script>
